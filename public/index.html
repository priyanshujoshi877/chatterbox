<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ChatterBox - Beautiful real-time chat. Connect with anyone using their unique ID.">
  <title>ChatterBox — Connect & Chat</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
</head>
<body>

  <!-- Animated Background -->
  <div class="animated-bg">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <!-- Floating Particles (generated by JS) -->
  <div class="particles" id="particles"></div>

  <!-- Auth Container -->
  <div class="auth-container">
    
    <!-- Left Brand Panel -->
    <div class="auth-brand">
      <div class="brand-logo">💬</div>
      <h1 class="brand-name">ChatterBox</h1>
      <p class="brand-tagline">Connect with anyone, anywhere. Share your unique ID and start chatting instantly.</p>
      
      <div class="brand-features">
        <div class="brand-feature">
          <div class="icon">⚡</div>
          <span>Lightning-fast real-time messaging</span>
        </div>
        <div class="brand-feature">
          <div class="icon">🔒</div>
          <span>Secure & encrypted conversations</span>
        </div>
        <div class="brand-feature">
          <div class="icon">🆔</div>
          <span>Unique ID system — no phone number needed</span>
        </div>
        <div class="brand-feature">
          <div class="icon">🌈</div>
          <span>Beautiful, modern chat experience</span>
        </div>
      </div>
    </div>

    <!-- Right Form Panel -->
    <div class="auth-form-section">
      <div class="auth-card">
        
        <!-- Tab Switcher -->
        <div class="auth-tabs">
          <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">Login</button>
          <button class="auth-tab" id="registerTab" onclick="switchTab('register')">Register</button>
        </div>

        <!-- Error / Success Messages -->
        <div class="auth-error" id="authError"></div>
        <div class="auth-success" id="authSuccess"></div>

        <!-- Login Form -->
        <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" class="form-input" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn-primary" id="loginBtn">
            Sign In
          </button>
        </form>

        <!-- Register Form -->
        <form class="auth-form hidden" id="registerForm" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label for="registerUsername">Username</label>
            <input type="text" id="registerUsername" class="form-input" placeholder="Choose a username" required minlength="3" maxlength="20" autocomplete="username">
          </div>
          <div class="form-group">
            <label for="registerEmail">Email</label>
            <input type="email" id="registerEmail" class="form-input" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="registerPassword">Password</label>
            <input type="password" id="registerPassword" class="form-input" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
          </div>
          <button type="submit" class="btn-primary" id="registerBtn">
            Create Account
          </button>
        </form>

      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
